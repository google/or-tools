# ref: https://github.com/actions/runner-images
name: arm64 MacOS CMake Python

on:
  push:
    branches:
      - ci
      - main
  workflow_dispatch:

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  native:
    strategy:
      matrix:
        cmake: [
          {name: "Xcode", generator: "Xcode", config: Release, build_target: ALL_BUILD, test_target: RUN_TESTS, install_target: install},
          {name: "Make", generator: "Unix Makefiles", config: Release, build_target: all, test_target: test, install_target: install},
        ]
        python: [
          {version: "3.10"},
          #{version: "3.11"},
          #{version: "3.12"},
          {version: "3.13"},
          {version: "3.14"},
        ]
      fail-fast: false
    name: arm64•MacOS•CMake(${{matrix.cmake.name}})•Python-${{matrix.python.version}}
    runs-on: macos-latest # macos arm64 based runner
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/remote_cache
        with:
          credentials_json: '${{secrets.GCP_BUCKET_API_KEY}}'
          set_cmake_sccache_launcher: true
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{matrix.python.version}}
      - name: Update Path
        run: |
          echo "$HOME/Library/Python/${{matrix.python.version}}/bin" >> $GITHUB_PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      # can't use brew swig (4.4) since Director python support is broken on macos
      # see: https://github.com/swig/swig/issues/3279
      - name: Install SWIG
        run: |
          wget -q https://downloads.sourceforge.net/project/swig/swig/swig-4.3.1/swig-4.3.1.tar.gz && tar xzvf swig-4.3.1.tar.gz && rm swig-4.3.1.tar.gz
          cd swig-4.3.1 && ./configure --prefix=$HOME/.local && make -j 4 && make install
          rm -rf swig-4.3.1
      - name: Check SWIG
        run: swig -version

      - name: Check CMake
        run: cmake --version
      - name: Configure
        run: >
          cmake -S. -Bbuild
          -G "${{matrix.cmake.generator}}"
          -DCMAKE_BUILD_TYPE=${{matrix.cmake.config}}
          -DBUILD_CXX_SAMPLES=OFF -DBUILD_CXX_EXAMPLES=OFF
          -DBUILD_PYTHON=ON
          -DCMAKE_INSTALL_PREFIX=install
      - id: num_cores
        uses: ./.github/actions/num_cores
      - name: Build
        run: >
          cmake --build build
          --config ${{matrix.cmake.config}}
          --target ${{matrix.cmake.build_target}}
          -j${{ steps.num_cores.outputs.cores }}
          -v
      - name: Test
        run: >
          CTEST_OUTPUT_ON_FAILURE=1
          cmake --build build
          --config ${{matrix.cmake.config}}
          --target ${{matrix.cmake.test_target}}
          -j${{ steps.num_cores.outputs.cores }}
          -v
      - name: Install
        run: >
          cmake --build build
          --config ${{matrix.cmake.config}}
          --target ${{matrix.cmake.install_target}}
          -v
  arm64_macos_cmake_python:
    runs-on: ubuntu-latest
    needs: native
    steps:
      - uses: actions/checkout@v7
