# ref: https://github.com/actions/runner-images
name: arm64 MacOS Bazel

on:
  push:
    branches:
      - ci
      - main
  workflow_dispatch:

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

# Building using the github runner environment directly.
jobs:
  arm64-MacOS-Bazel-Python:
    strategy:
      matrix:
        python: [
          #{version: '3.10'},
          #{version: '3.11'},
          {version: '3.12'},
          #{version: '3.13'},
          #{version: '3.14'},
        ]
      fail-fast: false
    runs-on: macos-latest # macos arm64 based runner
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/remote_cache
        with:
          credentials_json: '${{secrets.GCP_BUCKET_API_KEY}}'
          set_home_bazelrc: true
      - name: Set Java to OpenJDK 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Check mvn
        run: mvn --version
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{matrix.python.version}}
      - name: Check Python
        run: python --version
      - uses: bazel-contrib/setup-bazel@0.19.0
      - name: Check Bazel
        run: bazel version
      - name: Change Python in .bazelrc
        run: |
          sed -i '' -e 's/\(python_version=\)3.[0-9]*/\1${{matrix.python.version}}/g' .bazelrc
          cat .bazelrc
      - name: Change Python in MODULE.bazel
        run: |
          sed -i '' -e 's/\(DEFAULT_PYTHON =\) "3.[0-9]*"/\1 "${{matrix.python.version}}"/g' MODULE.bazel
          cat MODULE.bazel
      - name: Build
        run: bazel build --config=ci //...
      - name: Test
        run: bazel test  --config=ci //ortools/...

  arm64_macos_bazel:
    runs-on: ubuntu-latest
    needs: arm64-MacOS-Bazel-Python
    steps:
      - uses: actions/checkout@v6
