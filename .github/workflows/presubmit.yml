# ref: https://github.com/actions/runner-images
name: Presubmit

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - ci
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  JAVA_DISTRIBUTION: 'temurin'
  JAVA_VERSION: '21'

jobs:
###############################################################################
  clang-format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: jidicula/clang-format-action@v4.18.0
      with:
        exclude-regex: '\.tab\.hh$'
###############################################################################
  Bazel:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-2022]
    runs-on: ${{matrix.os}}
    steps:
    - uses: actions/checkout@v6
    - uses: 'google-github-actions/auth@v3'
      # Disable auth and caching when running from a fork.
      # By default, secrets are not passed to workflows triggered from forks, including Dependabot.
      if: github.event.pull_request.head.repo.fork == false
      with:
        credentials_json: '${{secrets.GCP_BUCKET_API_KEY}}'
    - uses: actions/setup-python@v6
      with:
        python-version: ${{env.PYTHON_VERSION}}
    - uses: bazel-contrib/setup-bazel@0.19.0
    - name: Build
      run: bazel test --config=ci --config=remote_cache //ortools/...
      shell: bash
###############################################################################
  CMake:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build: [cpp, java, dotnet, python]
        include:
          # Map build to CMake
          - build: cpp
            cmake_options: '-DBUILD_DEPS=ON'
          - build: java
            cmake_options: '-DBUILD_CXX_SAMPLES=OFF -DBUILD_CXX_EXAMPLES=OFF -DBUILD_JAVA=ON -DSKIP_GPG=ON'
          - build: dotnet
            cmake_options: '-DBUILD_CXX_SAMPLES=OFF -DBUILD_CXX_EXAMPLES=OFF -DBUILD_DOTNET=ON'
          - build: python
            cmake_options: '-DBUILD_CXX_SAMPLES=OFF -DBUILD_CXX_EXAMPLES=OFF -DBUILD_PYTHON=ON'
          # Map os to platform / generator
          - os: ubuntu-latest
            platform: linux
            generator: Ninja
            cmake_flags: -DCMAKE_BUILD_TYPE=Release
          - os: macos-latest
            platform: macos
            generator: Ninja
            cmake_flags: -DCMAKE_BUILD_TYPE=Release
    runs-on: ${{matrix.os}}
    env:
      SCCACHE_GHA_ENABLED: true
      SCCACHE_GCS_BUCKET: or-tools-github-remote-caching
      SCCACHE_GCS_KEY_PREFIX: cmake
      SCCACHE_GCS_RW_MODE: READ_WRITE
    steps:
    - uses: actions/checkout@v6
    - uses: 'google-github-actions/auth@v3'
      # Disable auth and caching when running from a fork.
      # By default, secrets are not passed to workflows triggered from forks, including Dependabot.
      if: github.event.pull_request.head.repo.fork == false
      with:
        credentials_json: '${{secrets.GCP_BUCKET_API_KEY}}'
    - name: Run sccache-cache
      uses: mozilla-actions/sccache-action@v0.0.10
      env:
        SCCACHE_GCS_KEY_PATH: ${{env.GOOGLE_GHA_CREDS_PATH}}
    - uses: actions/setup-java@v5
      if: ${{ matrix.build == 'java' }}
      with:
        distribution: ${{env.JAVA_DISTRIBUTION}}
        java-version: ${{env.JAVA_VERSION}}
    - uses: actions/setup-python@v6
      with:
        python-version: ${{env.PYTHON_VERSION}}
    - name: Setup linux
      if: ${{ matrix.platform == 'linux' }}
      run: sudo apt install -y ninja-build swig
    - name: Setup macos
      # can't use brew swig (4.4) since Director python support is broken on macos
      # see: https://github.com/swig/swig/issues/3279
      if: ${{ matrix.platform == 'macos' }}
      run: |
        brew install ninja
        wget -q https://downloads.sourceforge.net/project/swig/swig/swig-4.3.1/swig-4.3.1.tar.gz && tar xzvf swig-4.3.1.tar.gz && rm swig-4.3.1.tar.gz
        cd swig-4.3.1 && ./configure --prefix=$HOME/.local && make -j 4 && make install
        rm -rf swig-4.3.1
        echo "$HOME/.local/bin" >> $GITHUB_PATH
    - name: Setup Linux Python Env
      if: ${{ matrix.build == 'python' && matrix.platform == 'linux' }}
      run: echo "$HOME/.local/bin" >> $GITHUB_PATH
    - name: Setup MacOs Python Env
      if: ${{ matrix.build == 'python' && matrix.platform == 'macos' }}
      run: |
        echo "$HOME/Library/Python/${{env.PYTHON_VERSION}}/bin" >> $GITHUB_PATH
        echo "$HOME/.local/bin" >> $GITHUB_PATH
    - name: Config
      run: >
        cmake
        -S.
        -Bbuild
        -G "${{matrix.generator}}"
        ${{matrix.cmake_options}}
        ${{matrix.cmake_flags}}
        -DCMAKE_INSTALL_PREFIX=install
        -DUSE_COINOR=OFF
        -DUSE_GLPK=OFF
        -DUSE_HIGHS=OFF
        -DUSE_SCIP=OFF
        -DCMAKE_C_COMPILER_LAUNCHER="${{env.SCCACHE_PATH}}"
        -DCMAKE_CXX_COMPILER_LAUNCHER="${{env.SCCACHE_PATH}}"
    - name: Build
      run: cmake --build build --config Release -j --target all
    - name: Test
      shell: bash
      run: |
        echo "Determining number of cores..."
        if [[ "$RUNNER_OS" == "Linux" ]]; then
          CORES=$(nproc)
        elif [[ "$RUNNER_OS" == "macOS" ]]; then
          CORES=$(sysctl -n hw.ncpu)
        elif [[ "$RUNNER_OS" == "Windows" ]]; then
          CORES=$NUMBER_OF_PROCESSORS
        else
          echo "Unknown OS. Defaulting to 2 cores."
          CORES=2
        fi
        echo "Detected $CORES cores"
        ctest --test-dir build -j$CORES --output-on-failure --stop-on-failure
