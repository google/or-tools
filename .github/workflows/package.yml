name: Package

on:
  push:
    branches:
      - main
      - stable
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Build npm package
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Emscripten and CMake build
        uses: actions/cache@v4
        with:
          path: |
            emsdk/downloads
            emsdk/node
            emsdk/upstream
            emsdk/.emscripten
            build
          key: wasm-build-${{ runner.os }}-${{ hashFiles('package-lock.json', 'CMakeLists.txt', 'cmake/**/*.cmake', 'cmake/**/*.txt', 'patches/**', 'scripts/ensure-emsdk.sh', 'scripts/embed_proto.cmake', 'javascript/cp_sat_api.cc') }}
          restore-keys: |
            wasm-build-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install native build tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Build and pack library
        run: npm run pack:lib

      - name: Upload package artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: build/javascript/lib/*.tgz
          if-no-files-found: error
          retention-days: 7

  vite-fixture:
    name: Vite 7 / ${{ matrix.mode }} / ${{ matrix.browser }}
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: dev
            browser: chromium
            project: vite-dev-chromium
          - mode: dev
            browser: firefox
            project: vite-dev-firefox
          - mode: static
            browser: chromium
            project: vite-static-chromium
          - mode: static
            browser: firefox
            project: vite-static-firefox

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download package artifact
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: build/javascript/lib

      - name: Install browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Vite fixture
        run: npx playwright test --config tests/playwright.config.ts --project=${{ matrix.project }}

  publish:
    name: Publish release
    needs:
      - package
      - vite-fixture
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ startsWith(github.ref, 'refs/tags/v') && github.actor != 'nektos/act' }}
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: build/javascript/lib

      - name: Publish to npm
        run: npm publish build/javascript/lib/*.tgz --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" build/javascript/lib/*.tgz --generate-notes --verify-tag
