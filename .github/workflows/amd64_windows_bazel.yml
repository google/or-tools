# ref: https://github.com/actions/runner-images
name: amd64 Windows Bazel

on:
  push:
    branches:
      - ci
      - main
  workflow_dispatch:

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

# Building using the github runner environment directly.
jobs:
  amd64-Windows-Bazel-Python:
    strategy:
      matrix:
        python: [
        #  {version: '3.10'},
        #  {version: '3.11'},
          {version: '3.12'},
        #  {version: '3.13'},
        #  {version: '3.14'},
        ]
      fail-fast: false # Don't cancel all jobs if one fails.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/remote_cache
        with:
          credentials_json: '${{secrets.GCP_BUCKET_API_KEY}}'
          set_home_bazelrc: true
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Check java
        run: java -version
      - name: Check mvn
        run: mvn --version
      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{matrix.python.version}}
      - name: Check Python
        run: python --version
      - uses: bazel-contrib/setup-bazel@0.19.0
      - name: Check Bazel
        run: bazel version
      - name: Build
        run: bazel build --config=ci //...
      - name: Test
        run: bazel test  --config=ci //ortools/...

  amd64_windows_bazel:
    runs-on: ubuntu-latest
    needs: amd64-Windows-Bazel-Python
    steps:
      - uses: actions/checkout@v7
