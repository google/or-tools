# ref: https://github.com/actions/runner-images
name: amd64 Linux Bazel

on:
  push:
    branches:
      - ci
      - main
  workflow_dispatch:

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

# Building using the github runner environment directly.
jobs:
  amd64-Linux-Bazel-Python:
    strategy:
      matrix:
        python: [
          #{version: '3.10'},
          #{version: '3.11'},
          {version: '3.12'},
          #{version: '3.13'},
          #{version: '3.14'},
        ]
      fail-fast: false
    env:
      CC:  gcc-12
      CXX: g++-12
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/remote_cache
        with:
          credentials_json: '${{secrets.GCP_BUCKET_API_KEY}}'
          set_home_bazelrc: true
      - name: Check Java
        run: java -version
      - name: Check mvn
        run: mvn --version
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{matrix.python.version}}
      - name: Check Python
        run: python --version
      - uses: bazel-contrib/setup-bazel@0.19.0
      - name: Check Bazel
        run: bazel version
      - name: Change Python in .bazelrc
        run: |
          sed -i -e 's/\(python_version=\)3.[0-9]\+/\1${{matrix.python.version}}/g' .bazelrc
          cat .bazelrc
      - name: Change Python in .bazelrc
        run: |
          sed -i -e 's/\(DEFAULT_PYTHON =\) "3.[0-9]\+"/\1 "${{matrix.python.version}}"/g' MODULE.bazel
          cat MODULE.bazel
      - name: Build
        run: bazel build --config=ci //...
      - name: Test
        run: bazel test  --config=ci //ortools/...

  amd64_linux_bazel:
    runs-on: ubuntu-latest
    needs: amd64-Linux-Bazel-Python
    steps:
      - uses: actions/checkout@v7
