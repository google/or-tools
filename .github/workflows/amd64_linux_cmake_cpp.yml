# ref: https://github.com/actions/runner-images
name: amd64 Linux CMake C++

on:
  push:
    branches:
      - ci
      - main
  workflow_dispatch:

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

# Building using the github runner environment directly.
jobs:
  native:
    strategy:
      matrix:
        cmake: [
          {name: "Make", generator: "Unix Makefiles", config: Release},
          {name: "Ninja", generator: "Ninja", config: Release},
          {name: "NinjaMulti", generator: "Ninja Multi-Config", config: Release}
         ]
      fail-fast: false
    name: amd64•Linux•CMake(${{matrix.cmake.name}})•C++
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/remote_cache
        with:
          credentials_json: '${{secrets.GCP_BUCKET_API_KEY}}'
          set_cmake_sccache_launcher: true
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y ninja-build

      - name: Check CMake
        run: cmake --version
      - name: Configure
        run: >
          cmake -S. -Bbuild
          -G "${{matrix.cmake.generator}}"
          -DCMAKE_BUILD_TYPE=${{matrix.cmake.config}}
          -DBUILD_DEPS=ON
          -DCMAKE_INSTALL_PREFIX=install
      - id: num_cores
        uses: ./.github/actions/num_cores
      - name: Build
        run: >
          cmake --build build
          --config ${{matrix.cmake.config}}
          --target all
          -j${{ steps.num_cores.outputs.cores }}
          -v
      - name: Test
        run: >
          CTEST_OUTPUT_ON_FAILURE=1
          cmake --build build
          --config ${{matrix.cmake.config}}
          --target test
          -j${{ steps.num_cores.outputs.cores }}
          -v
      - name: Install
        run: >
          cmake --build build
          --config ${{matrix.cmake.config}}
          --target install
          -v
  amd64_linux_cmake_cpp:
    runs-on: ubuntu-latest
    needs: native
    steps:
      - uses: actions/checkout@v6
