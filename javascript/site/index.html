<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>CP-SAT WASM API demo</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; line-height: 1.5; }
    input, button, textarea { font-size: 1rem; }
    textarea { width: 100%; height: 18rem; }
    #status { white-space: pre-wrap; background: #f6f8fa; padding: 1rem; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>CP-SAT WASM API demo</h1>
  <p>This page exercises the new <code>cp_sat_api</code> WASM module. Use the controls below to run a magic square solve and inspect the <code>CpSolverResponse</code>.</p>
  <div style="display:flex; gap:1rem; flex-wrap:wrap; align-items:center; margin-bottom:0.5rem;">
    <label>Size <input id="size" type="number" value="5" min="1" style="width:4rem" /></label>
    <label>Workers <input id="workers" type="number" value="4" min="1" style="width:4rem" /></label>
    <button id="run">Run magic square</button>
    <span id="ready-indicator" style="color:#555;">Loading module…</span>
  </div>
  <p>Status / Response:</p>
  <pre id="status"></pre>

  <script src="https://unpkg.com/protobufjs@7.2.5/dist/protobuf.min.js"></script>
  <script src="cp_sat_api.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const append = (txt) => statusEl.textContent += `\n${txt}`;

    let modulePromise = null;
    let ResponseType = null;

    async function getModule() {
      if (!modulePromise) {
        modulePromise = cpSatModule();
      }
      return modulePromise;
    }

    async function getResponseType() {
      if (ResponseType) return ResponseType;
      const text = await fetch('cp_model.proto').then(r => r.text());
      ResponseType = protobuf.parse(text).root.lookupType("operations_research.sat.CpSolverResponse");
      return ResponseType;
    }

    async function runMagicSquare() {
      const size = parseInt(document.getElementById('size').value, 10);
      const workers = parseInt(document.getElementById('workers').value, 10);
      append(`Running magic square size=${size}, workers=${workers}…`);
      const [mod, Response] = await Promise.all([getModule(), getResponseType()]);

      const lenPtr = mod._malloc(4);
      const respPtr = await mod.ccall(
        '_solve_magic_square',
        'number',
        ['number', 'number', 'number'],
        [size, workers, lenPtr],
        { async: true });
      const len = mod.HEAPU32[lenPtr >> 2];
      mod._free(lenPtr);

      if (!respPtr || !len) {
        append('Call failed (no data).');
        return;
      }
      const bytes = mod.HEAPU8.slice(respPtr, respPtr + len);
      mod._free_buffer(respPtr);

      const message = Response.decode(bytes);
      const asObj = Response.toObject(message, { longs: String });
      statusEl.textContent = JSON.stringify(asObj, null, 2);
    }

    document.getElementById('run').addEventListener('click', runMagicSquare);

    // Update ready indicator when module is ready.
    getModule().then(() => {
      document.getElementById('ready-indicator').textContent = 'Module ready.';
    }).catch(err => {
      document.getElementById('ready-indicator').textContent = 'Module failed to load.';
      append(String(err));
    });
  </script>
</body>
</html>
