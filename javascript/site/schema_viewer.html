<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>CP-SAT WASM • Schema Viewer</title>
		<link rel="stylesheet" href="./example.css">
		<style>
			textarea { min-height: 12rem; }
		</style>
	</head>
	<body>
		<nav>
			<a href="../index.html">← All examples</a>
			<a href="https://github.com/Axelwickm/ortools-cpsat-wasm" rel="noopener">GitHub</a>
		</nav>
		<h1>Schema Viewer</h1>
		<p>This demo calls the WASM exports that expose the embedded <code>cp_model.proto</code>
			and <code>sat_parameters.proto</code>
			schemas and prints their contents.</p>
		<button id="load-schemas">Load schemas</button>
		<div id="status" class="status-line" role="status" aria-live="polite"></div>
		<h2>CpModelProto</h2>
		<textarea id="cp-schema" readonly></textarea>
		<h2>SatParameters</h2>
		<textarea id="sat-schema" readonly></textarea>

		<script type="module" src="./schema_viewer.ts"></script>
	</body>
</html>
