<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>CP-SAT WASM • Magic Square</title>
		<link rel="stylesheet" href="./example.css">
		<style>
			textarea { width: 100%; height: 18rem; }
			#status { min-height: 12rem; }
			#solution-wrapper { margin: 0.75rem 0; }
			#solution-grid {
				display: inline-grid;
				gap: 0.35rem;
				padding: 0.5rem;
				background: #fff;
				border: 1px solid #d0d7de;
				border-radius: 6px;
				min-height: 3rem;
			}
			#solution-grid .cell {
				min-width: 2.5rem;
				text-align: center;
				padding: 0.25rem 0.4rem;
				border-radius: 4px;
				background: #e8eef8;
				font-variant-numeric: tabular-nums;
			}
		</style>
	</head>
	<body>
		<nav><a href="../index.html">← All examples</a></nav>
		<h1>Magic Square (CP-SAT WASM)</h1>
		<p>This page exercises the <code>cp_sat_api</code>
			WASM module by building and solving a magic square model directly in the browser.</p>
		<div class="controls">
			<label>Size <input id="size" class="short-number" type="number" value="5" min="1"></label>
			<label>Workers <input id="workers" class="short-number" type="number" value="4" min="1"></label>
			<label><input id="use-worker-bridge" type="checkbox" checked>
			Use worker bridge</label>
			<button id="run">Run magic square</button>
			<button id="stop" disabled>Stop</button>
		</div>
		<div id="solution-wrapper">
			<p>Latest solution:</p>
			<div id="solution-grid">Run the solver to view a magic square.</div>
		</div>
		<p>Status / Response:</p>
		<pre id="status"></pre>

		<script type="module" src="./magic_square.ts"></script>
	</body>
</html>
