edition = "2024";

package operations_research.math_opt.testing;

option java_outer_classname = "TestMessageOuterClass";

option java_package = "com.google.ortools.mathopt.testing";

message TestSubmessage {
  bool scalar = 1 [features.field_presence = IMPLICIT];

  bool scalar_optional = 2;
}

message TestMessage {
  double scalar = 1 [features.field_presence = IMPLICIT];

  double scalar_optional = 2;
  repeated double scalar_repeated = 3;
  TestSubmessage submessage = 4;
  repeated TestSubmessage submessage_repeated = 5;
}
