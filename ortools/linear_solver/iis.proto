// Irreducible Infeasible Set  Protocol Buffers.
//
// We use a different file to avoid having linear_solver.proto depend on
// external protos. This would break the portability of the proto.

syntax = "proto2";

package operations_research;

import "ortools/util/status.proto";

option java_package = "com.google.ortools.linearsolver";
option java_multiple_files = true;

message IISResponse {
  reserved 1;

  // IIS computation error status.
  optional operations_research.StatusProto error = 10;

  // IIS minimality. Note that if the computation hit a computation-limit, it
  // might still have an infeasible subsystem. For those cases `iis_is_minimal
  // = false`. At present this field can be `false` even if the IIS is proven
  // to be minimal.
  optional bool iis_is_minimal = 9 [default = false];

  // Indexes, in the original model, of constraints that are an
  // Infeasible Set: a set of n constraints such that:
  //  - the entire set is infeasible together
  //  - if `iis_is_minimal = true`, any subset is feasible
  repeated int32 constraint_index = 2 [packed = true];

  repeated int32 general_constraint_index = 3 [packed = true];

  // Detailed variable information is available only when
  // `variable_index` is not empty. Otherwise , all of the following fields
  // will be empty.
  //
  // If `variable_index` is empty, callers should treat all variables, bounds,
  // and integrality requirements as part of the IIS.

  // Indexes of variables participating in the IIS. Note that the support of
  // all variables in an iis constraint are part of the variables participating
  // in an IIS.
  repeated int32 variable_index = 5 [packed = true];

  // Indexes of variable whose lower bounds are part of the IIS. This should be
  // a subset of `variable_index`.
  repeated int32 variable_lower_bound_index = 6 [packed = true];

  // Indexes of variable whose upper bounds are part of the IIS. This should be
  // a subset of `variable_index`.
  repeated int32 variable_upper_bound_index = 7 [packed = true];

  // Indexes of variable whose integer requirements are part of the IIS. This
  // should be a subset of `variable_index`.
  repeated int32 variable_integer_requirement_index = 8 [packed = true];
}
